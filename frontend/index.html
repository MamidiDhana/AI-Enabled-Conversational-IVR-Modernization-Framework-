<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Hospital IVR System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.container{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
border-radius:24px;
padding:40px 36px;
width:400px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
text-align:center;
}

h2{
font-size:1.6rem;
margin-bottom:6px;
}

.subtitle{
font-size:0.85rem;
color:rgba(255,255,255,0.6);
margin-bottom:20px;
}

.start-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
margin-bottom:20px;
}

.keypad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:20px;
}

.key-btn{
padding:16px;
font-size:1.2rem;
border-radius:12px;
border:1px solid rgba(255,255,255,0.15);
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
}

.output-box{
background:rgba(0,0,0,0.25);
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:18px;
margin-top:15px;
min-height:60px;
}

.language-status{
margin-top:8px;
font-size:0.78rem;
color:rgba(255,255,255,0.75);
text-align:right;
}

#output{
font-size:0.95rem;
}

.ai-box{
margin-top:20px;
display:flex;
gap:10px;
}

.ai-box input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

.ai-box button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#667eea;
color:white;
}

.control-row{
display:flex;
justify-content:center;
align-items:center;
flex-wrap:wrap;
gap:8px;
margin-bottom:14px;
}

.toggle-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:0.85rem;
}

.language-select{
padding:8px 10px;
border:none;
border-radius:8px;
outline:none;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:0.85rem;
}

.language-select option{
color:#111;
}

.stop-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:rgba(255,99,71,0.85);
color:#fff;
font-size:0.85rem;
}

.quick-actions{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-top:14px;
}

.quick-btn{
padding:8px 10px;
font-size:0.8rem;
border:none;
border-radius:8px;
cursor:pointer;
background:rgba(255,255,255,0.12);
color:#fff;
}

.history-box{
margin-top:14px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
padding:10px;
max-height:140px;
overflow-y:auto;
text-align:left;
}

.history-box h4{
font-size:0.82rem;
margin-bottom:8px;
color:rgba(255,255,255,0.8);
}

.history-item{
font-size:0.78rem;
margin-bottom:6px;
color:rgba(255,255,255,0.9);
}

/* notification style */

.notification{
position:fixed;
bottom:20px;
right:20px;
background:#667eea;
padding:10px 16px;
border-radius:8px;
color:white;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="container">

<div style="font-size:40px;margin-bottom:10px;">🏥</div>

<h2>City Hospital IVR</h2>
<p id="subtitle" class="subtitle">Hospital Management Conversational IVR</p>

<div class="control-row">
<select id="languageSelect" class="language-select" onchange="setLanguage(this.value)">
<option value="en-US">English</option>
<option value="hi-IN">हिन्दी</option>
<option value="ta-IN">தமிழ்</option>
<option value="te-IN">తెలుగు</option>
<option value="kn-IN">ಕನ್ನಡ</option>
<option value="ml-IN">മലയാളം</option>
<option value="bn-IN">বাংলা</option>
</select>
<button id="speechToggle" class="toggle-btn" onclick="toggleSpeech()">Voice: On</button>
<button id="stopBtn" class="stop-btn" onclick="stopVoice()">Stop Voice</button>
</div>

<button id="startBtn" class="start-btn" onclick="startCall()">Start Call</button>

<div class="keypad">
<button class="key-btn" onclick="sendInput('1')">1</button>
<button class="key-btn" onclick="sendInput('2')">2</button>
<button class="key-btn" onclick="sendInput('3')">3</button>
<button class="key-btn" onclick="sendInput('4')">4</button>
<button class="key-btn" onclick="sendInput('5')">5</button>
<button class="key-btn" onclick="sendInput('6')">6</button>
<button class="key-btn" onclick="sendInput('7')">7</button>
<button class="key-btn" onclick="sendInput('8')">8</button>
<button class="key-btn" onclick="sendInput('9')">9</button>
<button class="key-btn" onclick="sendInput('*')">*</button>
<button class="key-btn" onclick="sendInput('0')">0</button>
<button class="key-btn" onclick="sendInput('#')">#</button>
</div>

<div class="output-box">
<p id="output">Press Start Call to contact City Hospital. Press 4 for Department Information.</p>
<p id="languageStatus" class="language-status">Language: English</p>
</div>

<div class="ai-box">
<input id="aiInput" placeholder="Type: I want appointment">
<button id="sendBtn" onclick="sendAI()">Send</button>
<button id="voiceBtn" onclick="startVoice()">🎤</button>
</div>

<div class="quick-actions">
<button id="quickDepartments" class="quick-btn" onclick="quickAsk('what departments are available')">Departments</button>
<button id="quickTimings" class="quick-btn" onclick="quickAsk('hospital timings')">Timings</button>
<button id="quickLocation" class="quick-btn" onclick="quickAsk('hospital location')">Location</button>
<button id="quickInsurance" class="quick-btn" onclick="quickAsk('insurance support')">Insurance</button>
</div>

<div class="history-box">
<h4 id="historyTitle">Live Interaction History</h4>
<div id="history"></div>
</div>

</div>

function localizeText(text){

if(selectedLanguage==="en-US") return text;

const dictionary=STATIC_TRANSLATIONS[selectedLanguage] || {};

if(dictionary[text]){
return dictionary[text];
}

const doctorWaitMatch=text.match(/^Doctor availability selected\. Please wait while we retrieve doctor schedules\. Estimated wait time is about (\d+) minutes\.$/);
if(doctorWaitMatch){
const minutes=doctorWaitMatch[1];
const minuteWord=(WAIT_MINUTE_WORDS[selectedLanguage] && WAIT_MINUTE_WORDS[selectedLanguage][minutes]) || minutes;

if(selectedLanguage==="hi-IN"){
return `डॉक्टर उपलब्धता चुनी गई है। कृपया प्रतीक्षा करें। अनुमानित प्रतीक्षा समय लगभग ${minuteWord} मिनट है।`;
}

if(selectedLanguage==="ta-IN"){
return `மருத்துவர் கிடைப்புத் தேர்வு செய்யப்பட்டது. தயவுசெய்து காத்திருக்கவும். கணிக்கப்பட்ட காத்திருப்பு நேரம் சுமார் ${minuteWord} நிமிடங்கள்.`;
}

if(selectedLanguage==="te-IN"){
return `డాక్టర్ అందుబాటు ఎంపిక చేయబడింది. దయచేసి వేచి ఉండండి. అంచనా వేచిచూడే సమయం సుమారు ${minuteWord} నిమిషాలు.`;
}

if(selectedLanguage==="kn-IN"){
return `ವೈದ್ಯರ ಲಭ್ಯತೆ ಆಯ್ಕೆಮಾಡಲಾಗಿದೆ. ದಯವಿಟ್ಟು ಕಾಯಿರಿ. ಅಂದಾಜು ನಿರೀಕ್ಷಾ ಸಮಯ ಸುಮಾರು ${minuteWord} ನಿಮಿಷಗಳು.`;
}

if(selectedLanguage==="ml-IN"){
return `ഡോക്ടർ ലഭ്യത തെരഞ്ഞെടുത്തു. ദയവായി കാത്തിരിക്കുക. കണക്കാക്കിയ കാത്തിരിപ്പ് സമയം ഏകദേശം ${minuteWord} മിനിറ്റ് ആണ്.`;
}

if(selectedLanguage==="bn-IN"){
return `ডাক্তার উপলভ্যতা নির্বাচন করা হয়েছে। অনুগ্রহ করে অপেক্ষা করুন। আনুমানিক অপেক্ষার সময় প্রায় ${minuteWord} মিনিট।`;
}
}

return text;

}

function setLanguage(languageCode){

selectedLanguage=languageCode;
localStorage.setItem("ivrLanguage",selectedLanguage);

const labels=UI_LABELS[selectedLanguage] || UI_LABELS["en-US"];

document.getElementById("subtitle").innerText=labels.subtitle;
document.getElementById("startBtn").innerText=labels.startCall;
document.getElementById("sendBtn").innerText=labels.send;
document.getElementById("voiceBtn").innerText="🎤";
document.getElementById("historyTitle").innerText=labels.history;
document.getElementById("aiInput").placeholder=labels.aiPlaceholder;
document.getElementById("languageStatus").innerText=labels.languageStatus;
document.getElementById("quickDepartments").innerText=labels.quickDepartments;
document.getElementById("quickTimings").innerText=labels.quickTimings;
document.getElementById("quickLocation").innerText=labels.quickLocation;
document.getElementById("quickInsurance").innerText=labels.quickInsurance;
document.getElementById("speechToggle").innerText=speechEnabled?labels.voiceOn:labels.voiceOff;
document.getElementById("stopBtn").innerText=labels.stopVoice;

if(!sessionId){
document.getElementById("output").innerText=labels.defaultOutput;
}

const selector=document.getElementById("languageSelect");
if(selector && selector.value!==selectedLanguage){
selector.value=selectedLanguage;
}

const messageMap={
"en-US":"Language switched to English",
"hi-IN":"भाषा हिन्दी में बदल दी गई है।",
"ta-IN":"மொழி தமிழாக மாற்றப்பட்டுள்ளது.",
"te-IN":"భాష తెలుగుకు మార్చబడింది.",
"kn-IN":"ಭಾಷೆಯನ್ನು ಕನ್ನಡಕ್ಕೆ ಬದಲಿಸಲಾಗಿದೆ.",
"ml-IN":"ഭാഷ മലയാളത്തിലേക്ക് മാറ്റി.",
"bn-IN":"ভাষা বাংলায় পরিবর্তন করা হয়েছে।"
};

notifyUser("City Hospital IVR",messageMap[selectedLanguage] || "Language updated");

}

function initializeLanguage(){

const savedLanguage=localStorage.getItem("ivrLanguage") || "en-US";
setLanguage(savedLanguage);

}

function getBestVoice(languageCode){

const synth=window.speechSynthesis;
const voices=synth.getVoices();

if(!voices || voices.length===0){
return null;
}

const normalized=languageCode.toLowerCase();
const base=normalized.split("-")[0];

const exact=voices.find(voice=>voice.lang.toLowerCase()===normalized);
if(exact) return exact;

const sameBase=voices.find(voice=>voice.lang.toLowerCase().startsWith(base));
if(sameBase) return sameBase;

const englishFallback=voices.find(voice=>voice.lang.toLowerCase().startsWith("en"));
if(englishFallback) return englishFallback;

return voices[0];

}

function initializeSpeechEngine(){

if(!("speechSynthesis" in window)){
speechReady=false;
return;
}

window.speechSynthesis.getVoices();
speechReady=true;

}

function speak(text){

if(!speechEnabled) return;

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
currentAudio=null;
}

window.speechSynthesis.cancel();

fetch("http://127.0.0.1:8000/tts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
language:selectedLanguage
})
})
.then(res=>res.json())
.then(data=>{

if(data.audio_base64){
const audioSrc=`data:audio/mp3;base64,${data.audio_base64}`;
const audio=new Audio(audioSrc);
currentAudio=audio;

audio.onended=function(){
currentAudio=null;
};

audio.play().catch(()=>{
currentAudio=null;
fallbackBrowserSpeech(text);
});
return;
}

fallbackBrowserSpeech(text);

})
.catch(()=>{
fallbackBrowserSpeech(text);
});

}

function fallbackBrowserSpeech(text){

if(!("speechSynthesis" in window)){
notifyUser("City Hospital IVR","Voice output is not supported in this browser");
return;
}

if(!speechReady){
initializeSpeechEngine();
}

const speech=new SpeechSynthesisUtterance();

speech.text=text;
speech.lang=selectedLanguage;

const matchedVoice=getBestVoice(selectedLanguage);

if(matchedVoice){
speech.voice=matchedVoice;
speech.lang=matchedVoice.lang;
}

speech.rate=1;
speech.pitch=1;

window.speechSynthesis.speak(speech);

}

function showNotification(text){

let notification=document.createElement("div");

notification.className="notification";

notification.innerText=text;

document.body.appendChild(notification);

setTimeout(()=>{
notification.remove();
},3000);

}

async function requestNotificationPermission(){

if(!("Notification" in window)) return false;

if(Notification.permission==="granted") return true;

if(Notification.permission==="denied") return false;

const permission=await Notification.requestPermission();

return permission==="granted";

}

function notifyUser(title,body){

const localizedBody=localizeText(body);

showNotification(localizedBody);

if("Notification" in window && Notification.permission==="granted"){
new Notification(title,{body:localizedBody});
}

}

function appendHistory(source,text){

const history=document.getElementById("history");
const item=document.createElement("div");
const time=new Date().toLocaleTimeString();

item.className="history-item";
item.innerText=`${time} - ${source}: ${text}`;

history.prepend(item);

}

function toggleSpeech(){

speechEnabled=!speechEnabled;

const labels=UI_LABELS[selectedLanguage] || UI_LABELS["en-US"];
document.getElementById("speechToggle").innerText=speechEnabled?labels.voiceOn:labels.voiceOff;

if(!speechEnabled){
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
currentAudio=null;
}
window.speechSynthesis.cancel();
}

notifyUser("City Hospital IVR",speechEnabled?"Voice output enabled":"Voice output disabled");

}

function stopVoice(){

if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
currentAudio=null;
}
window.speechSynthesis.cancel();
speechEnabled=false;
const labels=UI_LABELS[selectedLanguage] || UI_LABELS["en-US"];
document.getElementById("speechToggle").innerText=labels.voiceOff;
notifyUser("City Hospital IVR","Voice output disabled");

}

function quickAsk(text){

document.getElementById("aiInput").value=text;
sendAI();

}

function startCall(){

requestNotificationPermission();

fetch("http://127.0.0.1:8000/ivr/start",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({})
})
.then(res=>res.json())
.then(data=>{

sessionId=data.session_id;

const localizedMessage=localizeText(data.message);

document.getElementById("output").innerText=localizedMessage;
appendHistory("System",localizedMessage);

speak(localizedMessage);

notifyUser("City Hospital IVR","Call Started");

});

}

function sendInput(digit){

if(!sessionId){
notifyUser("City Hospital IVR","Please start call first");
return;
}

fetch("http://127.0.0.1:8000/ivr/input",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
session_id:sessionId,
digit:digit
})
})
.then(res=>res.json())
.then(data=>{

const localizedMessage=localizeText(data.message);

document.getElementById("output").innerText=localizedMessage;
appendHistory("IVR",`Key ${digit} -> ${localizedMessage}`);

speak(localizedMessage);

notifyUser("City Hospital IVR","IVR Response");

});

}

function sendAI(){

let message=document.getElementById("aiInput").value;

if(!message || !message.trim()){
notifyUser("City Hospital IVR","Please enter or speak a message");
return;
}

fetch("http://127.0.0.1:8000/ai/message",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
message:message,
session_id:sessionId || null
})
})
.then(res=>res.json())
.then(data=>{

let aiOutput=data.prompt;

if(data.intent==="unknown"){
aiOutput=`${data.prompt} ${UNKNOWN_HELP_MAP[selectedLanguage] || UNKNOWN_HELP_MAP["en-US"]}`;
}

const localizedOutput=localizeText(aiOutput);

document.getElementById("output").innerText=localizedOutput;
appendHistory("AI",`You: ${message}`);
appendHistory("AI",localizedOutput);

speak(localizedOutput);

notifyUser("City Hospital IVR","AI Response");

});

}

function startVoice(){

const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
notifyUser("City Hospital IVR","Voice input is not supported in this browser");
return;
}

const recognition=new SpeechRecognition();

recognition.lang=RECOGNITION_LANGUAGE_MAP[selectedLanguage] || selectedLanguage;

recognition.onresult=function(event){

const text=event.results[0][0].transcript;

document.getElementById("aiInput").value=text;

sendAI();

}

recognition.start();

}

initializeLanguage();
initializeSpeechEngine();

if("speechSynthesis" in window){
window.speechSynthesis.onvoiceschanged=function(){
initializeSpeechEngine();
};
}

</script>
